name: if job-level
on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name=='pull_request'
    steps:
      - name: pull request triggered workflow
        run: echo "pull request triggered the workflow"


  deploy:
    runs-on: ubuntu-latest
    if: github.event_name=='push' && github.ref_name=='main'
    steps:
      - name: push to main triggered workflow
        run: echo "push to main triggered the workflow"