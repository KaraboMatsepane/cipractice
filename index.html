<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #22c55e;
            color: white;
            border-radius: 999px;
            font-weight: bold;
            font-size: 1rem;
        }

        footer {
            margin-top: 35px;
            font-size: 0.9rem;
            color: #d1d5db;
        }

        code {
            color: #93c5fd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Deployment Successful!</h1>

    <p>
        Welcome to my AWS S3 static website.
    </p>

    <p>
        This page was automatically deployed using a
        <strong>GitHub Actions CI/CD pipeline</strong>.
    </p>

    <div class="badge">
        ✅ GitHub → GitHub Actions → AWS S3
    </div>

    <footer>
        Built by <strong>Karabo Matsepane</strong><br><br>
        Every push to <code>main</code> automatically updates this website.
    </footer>
</div>

</body>
</html>
